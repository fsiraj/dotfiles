# Terminal
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"
set -g allow-passthrough on
set -s extended-keys on
set -g focus-events on
set -g aggressive-resize on

# Cursor and input
set -g cursor-style block
set -s escape-time 0
set -g status-keys emacs
set -g mouse on
set -wg mode-keys vi

# History and messages
set -g history-limit 50000
set -g display-time 5000
set -g status-interval 5

# Start indexing windows and panes at 1
set -g base-index 1
set -wg pane-base-index 1
set -g renumber-windows on

# Resurrect
set -g @resurrect-save "C-w"
set -g @resurrect-restore "C-r"
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-processes ':all:'
set -g @resurrect-hook-post-save-layout 'sed -i -E \
    -e "/^(pane|window|grouped_session)\t_/d" \
    -e "s/\t:nvim( [^\t]*)?$/\t:nvim -c RestoreSession/" \
'
set -g @resurrect-hook-pre-restore-all 'tmux set-environment -g NO_FF 1'
set -g @resurrect-hook-post-restore-all 'tmux set-environment -g -u NO_FF'

# Styling

# WARNING: Managed by `style.lua`
## Colors
set -g @thm_accent "#2f81f7"
set -g @thm_base "#0d1117"
set -g @thm_fg "#e6edf3"
set -g @thm_green "#3fb950"
set -g @thm_inactive "#6e7681"
set -g @thm_mantle "#161b22"
set -g @thm_mauve "#bc8cff"
set -g @thm_orange "#f0883e"

## General status styling
set -g status-justify absolute-centre
set -gF status-style "bg=#{@thm_base},fg=#{@thm_fg}"

## Panes
set -g @thm_active "#{?pane_in_mode,#{@thm_mauve},#{?pane_synchronized,#{@thm_orange},#{@thm_green}}}"
set -wgF pane-active-border-style "fg=#{@thm_active}"
set -wgF pane-border-style "fg=#{@thm_mantle}"
set -wg pane-border-lines heavy

## Left Status
set -g status-left '#{?client_prefix,#[bold]#[bg=#{@thm_orange}]#[fg=#{@thm_mantle}] PREFIX ,}'
set -g status-left-length 100

## Window Status
set -g window-status-separator ' '
set -g window-status-format '#[fg=#{@thm_base},bg=#{@thm_inactive}] #I '
set -ag window-status-format '#[fg=#{@thm_fg},bg=#{@thm_mantle}] #{P:#{?pane_active,●,○}} '
set -g window-status-current-format '#[bold,fg=#{@thm_base},bg=#{E:@thm_active}] #I '
set -ag window-status-current-format '#[nobold,fg=#{@thm_fg},bg=#{@thm_mantle}] #{P:#{?pane_active,#[fg=#{E:@thm_active}]●#[fg=#{@thm_fg}],○}} '

## Right status
set -g status-right ''

# Miscellaneous
set -gF popup-style "bg=#{@thm_mantle},fg=#{@thm_fg}"
set -gF popup-border-style "bg=#{@thm_mantle},fg=#{@thm_mantle}"
set -gF message-style "bg=#{@thm_base},fg=#{@thm_green}"
set -gF message-command-style "bg=#{@thm_base},fg=#{@thm_fg}"
set -gF menu-style "bg=#{@thm_mantle},fg=#{@thm_fg}"
set -gF menu-selected-style "bg=#{@thm_inactive},fg=#{@thm_fg}"
set -g menu-border-lines none
set -wgF mode-style "bg=#{@thm_inactive},bold"

# Keymaps

unbind C-b
set -g prefix C-a
bind C-a send-prefix

bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind = select-layout -E
bind e choose-tree
bind x kill-pane
bind r source-file ~/.config/tmux/tmux.conf
bind y set synchronize-panes
bind W command-prompt -p "Pane width (%%)" "resize-pane -x %1%%"
bind H command-prompt -p "Pane height (%%)" "resize-pane -y %1%%"
bind C-n next-window
bind C-p previous-window
bind s display-popup -w 20 -h 12 -E " \
    current=\$(tmux display-message -p '#S'); \
    tmux list-sessions -F '#S' \
    | grep -v '^_' | grep -v \$current \
    | fzf --reverse --header=\"\$current  \" --prompt='Session: ' \
    | xargs -r tmux switch-client -t \
"

bind v copy-mode
bind ] copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'C-v' send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind -T copy-mode-vi 'i' send -X cancel

# Vim-aware pane navigation (C-h/j/k/l moves between vim splits and tmux panes)
%hidden IS_VIM="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?\$'"
bind-key -n C-h if-shell "$IS_VIM" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$IS_VIM" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$IS_VIM" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$IS_VIM" 'send-keys C-l' 'select-pane -R'

# Load plugins
run "~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux"

# Basic options
set -g default-terminal "tmux-256color"
set -g cursor-style bar
set -g cursor-colour default
set -a terminal-features "xterm-256color:RGB"
set -g mouse on
set -g allow-passthrough on
set -g focus-events on
set -g pane-border-lines heavy

# Plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin "christoomey/vim-tmux-navigator"

# Status bar

# WARNING: Managed by `style.lua`
## Colors
set -g @thm_accent "#2f81f7"
set -g @thm_mantle "#161b22"
set -g @thm_fg "#e6edf3"
set -g @thm_surface_0 "#0d1117"
set -g @thm_surface_1 "#6e7681"
set -g @thm_orange "#f0883e"
set -g @thm_mauve "#bc8cff"
set -g @thm_blue "#58a6ff"
set -g @thm_green "#3fb950"


## General status styling
set -g status-justify absolute-centre
set -gF status-style "bg=#{@thm_surface_0},fg=#{@thm_fg}"

## Panes
set -g @pane_active_border_fg "#{?pane_in_mode,#{@thm_mauve},#{?pane_synchronized,#{@thm_orange},#{@thm_green}}}"
set -wgF pane-active-border-style "fg=#{@pane_active_border_fg}"
set -wgF pane-border-style "fg=#{@thm_surface_1}"

# Popups: catppuccin uses @thm_bg, which is not set by style.lua
set -gF popup-style "bg=#{@thm_mantle},fg=#{@thm_fg}"
set -gF popup-border-style "bg=#{@thm_mantle},fg=#{@thm_mantle}"

## Left Status
set -g status-left '#[bold]#[bg=#{?client_prefix,#{@thm_orange},#{@thm_mauve}}]#[fg=#{@thm_mantle}] #{?client_prefix,PREFIX,#h} '
set -g status-left-length 100

## Window Status
set -g @window_current_icon_bg "#{?pane_in_mode,#{@thm_mauve},#{?pane_synchronized,#{@thm_orange},#{@thm_green}}}"
set -g window-status-separator ' '
set -g window-status-format '#[fg=#{@thm_mantle},bg=#{@thm_surface_1}]  #I #[fg=#{@thm_fg},bg=#{@thm_mantle}] #P (of #{window_panes}) '
set -gF window-status-current-format '#[fg=#{@thm_mantle},bg=#{@window_current_icon_bg}]  #I #[fg=#{@thm_fg},bg=#{@thm_mantle}] #P (of #{window_panes}) '
set -gF window-status-activity-style 'bg=#{@thm_orange},fg=#{@thm_mantle}'
set -gF window-status-bell-style 'bg=#{@thm_mauve},fg=#{@thm_mantle}'

## Right Status
set -gF status-right '#[fg=#{@thm_mantle},bg=#{@thm_blue}] 󱞽  #[fg=#{@thm_fg},bg=#{@thm_mantle}] #{pane_current_command} #[fg=#{@thm_blue},bg=#{@thm_mantle}]█#[fg=#{@thm_mantle},bg=#{@thm_blue}]   #[fg=#{@thm_fg},bg=#{@thm_mantle}] #S '
set -g status-right-length 100

# Start indexing windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on

# Change prefix to Ctrl + a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Split panes using \ and -
unbind '"'
unbind %
set -g @vim_navigator_mapping_prev ""
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind = select-layout -E
bind e choose-tree
bind s display-popup -w 40 -h 12 -E "tmux list-sessions -F '#{session_name}' | fzf --reverse --prompt='Session: ' | xargs -r tmux switch-client -t"

# Vi style copy mode
set-window-option -g mode-keys vi
bind v copy-mode
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
bind -T copy-mode-vi 'i' send -X cancel

# Don't ask before closing pane
bind x kill-pane

# Shortcut to reload tmux configuration
bind r source-file ~/.config/tmux/tmux.conf

# Shortcut to synchronize input across panes
bind y set synchronize-panes

# Resize current pane to a percentage of window width/height
bind W command-prompt -p "Pane width (%)" "resize-pane -x %1%%"
bind H command-prompt -p "Pane height (%)" "resize-pane -y %1%%"

# Session persistence
set -g @resurrect-save "C-w"
set -g @resurrect-restore "C-r"
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-processes 'ssh btop journalctl'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run "~/.config/tmux/plugins/tpm/tpm"

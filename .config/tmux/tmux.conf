# Terminal
set -g allow-passthrough on
set -g extended-keys     on
set -g focus-events      on
set -g aggressive-resize on
set -g default-terminal  "tmux-256color"

# Cursor and input
set -g cursor-style      block
set -g escape-time       0
set -g status-keys       emacs
set -g mouse             on
set -g mode-keys         vi

# History and messages
set -g history-limit     50000
set -g display-time      5000
set -g status-interval   5

# Start indexing windows and panes at 1
set -g renumber-windows  on
set -g base-index        1
set -g pane-base-index   1

# Resurrect
set -g @resurrect-save "C-w"
set -g @resurrect-restore "C-r"
set -g @resurrect-processes ':all:'
set -g @resurrect-capture-pane-contents 'off'
set -g @resurrect-hook-post-save-layout 'sed -i -E -e "s/\t:nvim( [^\t]*)?$/\t:nvim -c RestoreSession/"'
set -g @resurrect-hook-pre-restore-all  'tmux set-environment -g NO_FF 1'
set -g @resurrect-hook-post-restore-all 'tmux set-environment -g -u NO_FF'

# Styling

## Colors
set -g @thm_accent   "colour51"
set -g @thm_base     "colour233"
set -g @thm_crust    "colour232"
set -g @thm_fg       "default"
set -g @thm_green    "green"
set -g @thm_inactive "brightblack"
set -g @thm_magenta  "magenta"
set -g @thm_orange   "colour214"
set -g @thm_active   "#{?pane_in_mode,#{@thm_blue},#{?pane_synchronized,#{@thm_orange},#{@thm_accent}}}"

## General status styling
set -g  status-position bottom
set -g  status-justify absolute-centre
set -gF status-style "fg=#{@thm_fg},bg=default"

## Panes
set -g  pane-border-lines single
set -g  pane-border-indicators arrows
set -gF pane-border-style "fg=#{@thm_crust}"
set -gF pane-active-border-style "fg=#{@thm_active}"

## Left Status
set -g status-left '#{?client_prefix,#[bold#,fg=#{@thm_crust}#,bg=#{@thm_orange}] PREFIX ,}'
set -g status-left-length 100

## Window Status
set -g window-status-separator ' '

set -g @win_pad     '#{?window_start_flag, #{s|.| |g:#{session_name}} ,}'
set -g @win_session '#{?window_end_flag,#[nobold#,dim#,fg=#{@thm_accent}#,bg=default] #S ,}'
set -g @win_bullet  '#{?pane_active,#[fg=#{E:@thm_active}]#{?window_zoomed_flag,[],•}#[fg=#{@thm_fg}],•}'

set -g  window-status-format '#{E:@win_pad}'
set -ag window-status-format '#[fg=#{@thm_fg},bg=#{@thm_inactive}] #I '
set -ag window-status-format '#[fg=#{@thm_fg},bg=#{@thm_crust}] #{P:•} '
set -ag window-status-format '#{E:@win_session}'

set -g  window-status-current-format '#{E:@win_pad}'
set -ag window-status-current-format '#[bold,fg=#{@thm_base},bg=#{E:@thm_active}] #I '
set -ag window-status-current-format '#[fg=#{@thm_fg},bg=#{@thm_crust}] #{P:#{E:@win_bullet}} '
set -ag window-status-current-format '#{E:@win_session}'

## Right status
set -g status-right ''

# Miscellaneous
set -gF menu-border-style        "fg=#{@thm_crust},bg=#{@thm_crust}"
set -gF menu-style               "fg=#{@thm_fg},bg=#{@thm_crust}"
set -gF menu-selected-style      "fg=#{@thm_fg},bg=#{@thm_inactive}"
set -gF popup-style              "fg=#{@thm_fg},bg=#{@thm_crust}"
set -gF popup-border-style       "fg=#{@thm_crust},bg=#{@thm_crust}"
set -gF message-style            "fg=#{@thm_green},bg=#{@thm_base}"
set -gF message-command-style    "fg=#{@thm_fg},bg=#{@thm_base}"
set -gF mode-style               "bold,bg=#{@thm_inactive}"
set -gF copy-mode-position-style "bold,fg=#{@thm_crust},bg=#{@thm_magenta}"

# Keymaps

unbind C-b
set -g prefix C-a
bind C-a send-prefix

%hidden SSH_SPLIT=' \
    c="$(ps -o args= -t #{pane_tty} | grep -m1 "^ssh ")"; \
    tmux split-window -$d -c "#{pane_current_path}" ${c:+zsh -c "$c; exec zsh"} \
'
bind \\  run-shell "d=h; $SSH_SPLIT"
bind -   run-shell "d=v; $SSH_SPLIT"
bind =   select-layout -E
bind e   choose-tree
bind x   kill-pane
bind r   source-file ~/.config/tmux/tmux.conf
bind y   set synchronize-panes
bind W   command-prompt -p "Pane width (%%)" "resize-pane -x %1%%"
bind H   command-prompt -p "Pane height (%%)" "resize-pane -y %1%%"
bind C-n next-window
bind C-p previous-window
bind s   display-popup -w 20 -h 12 -E " \
    current=\$(tmux display-message -p '#S'); \
    tmux list-sessions -F '#S' | grep -v \$current \
    | fzf --reverse --header=\"\$current  \" --prompt='Session: ' \
    | xargs -r tmux switch-client -t \
"
bind  v copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi C-v    send -X begin-selection \; send -X rectangle-toggle
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi Y      send -X copy-end-of-line-and-cancel
bind -T copy-mode-vi i      send -X cancel
bind -T copy-mode-vi Escape send -X cancel

# Vim-aware pane navigation and copy mode
%hidden IS_VIM=" \
    ps -o state= -o comm= -t '#{pane_tty}' | \
    grep -iqE '^[^TXZ ]+ +(\\S+\\/)?nvim\$' \
"
bind -n C-h if-shell "$IS_VIM" 'send-keys C-h' 'select-pane -L'
bind -n C-j if-shell "$IS_VIM" 'send-keys C-j' 'select-pane -D'
bind -n C-k if-shell "$IS_VIM" 'send-keys C-k' 'select-pane -U'
bind -n C-l if-shell "$IS_VIM" 'send-keys C-l' 'select-pane -R'
bind -n C-] if-shell "$IS_VIM" 'send-keys C-]' 'copy-mode'

# Vim scroll keybinds for TUIs
%hidden IS_TUI=" \
    ps -o state= -o comm= -t '#{pane_tty}' | \
    grep -iqE '^[^TXZ ]+ +(\\S+\\/)?(claude|opencode)\$' \
"
%hidden WHEEL_UP='Escape "[<64;8;8M"'
%hidden WHEEL_DOWN='Escape "[<65;8;8M"'
bind -n C-u if-shell "$IS_TUI" "send-keys -N 3 $WHEEL_UP"   'send-keys C-u'
bind -n C-d if-shell "$IS_TUI" "send-keys -N 3 $WHEEL_DOWN" 'send-keys C-d'

# Load plugins
run "~/.config/tmux/plugins/tmux-resurrect/resurrect.tmux"
